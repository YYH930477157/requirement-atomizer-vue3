<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Requirement Atomizer Review</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        background: #f4f6f7;
        color: #18242b;
      }
      header {
        padding: 16px 24px;
        background: #1f3d45;
        color: white;
      }
      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 650;
      }
      h2 {
        margin: 0 0 12px;
        font-size: 17px;
      }
      main {
        padding: 20px 24px;
        display: grid;
        gap: 16px;
      }
      .summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(140px, 1fr));
        gap: 12px;
      }
      section {
        background: white;
        border: 1px solid #d9e2ec;
        border-radius: 6px;
        padding: 16px;
      }
      .metric {
        background: white;
        border: 1px solid #d9e2ec;
        border-radius: 6px;
        padding: 14px;
      }
      .metric span {
        display: block;
        color: #52616b;
        font-size: 12px;
      }
      .metric strong {
        display: block;
        margin-top: 4px;
        font-size: 24px;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      select,
      button {
        height: 34px;
        border: 1px solid #bcccdc;
        border-radius: 5px;
        background: white;
        color: #243b53;
        padding: 0 10px;
        font: inherit;
      }
      button {
        cursor: pointer;
        background: #d64545;
        border-color: #d64545;
        color: white;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }
      th,
      td {
        border-bottom: 1px solid #e4e7eb;
        padding: 8px;
        text-align: left;
        vertical-align: top;
      }
      th {
        background: #f0f4f8;
      }
      code {
        background: #eef2f7;
        padding: 2px 4px;
        border-radius: 4px;
      }
      .muted {
        color: #6b7c86;
      }
      .badge {
        display: inline-block;
        min-width: 74px;
        text-align: center;
        border-radius: 999px;
        padding: 3px 8px;
        background: #e6f4ea;
        color: #1e7e34;
        font-size: 12px;
      }
      .badge.expert_pending {
        background: #fff3cd;
        color: #8a5a00;
      }
      .badge.unknown {
        background: #eef2f7;
        color: #52616b;
      }
      .scroll {
        overflow-x: auto;
      }
      @media (max-width: 900px) {
        .summary {
          grid-template-columns: repeat(2, minmax(140px, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Requirement Atomizer Review</h1>
    </header>
    <main>
      <div class="summary" id="summary"></div>
      <section>
        <h2>Quality</h2>
        <pre id="quality">Loading...</pre>
      </section>
      <section>
        <div class="toolbar">
          <h2 style="margin-right: auto">Requirements</h2>
          <select id="typeFilter">
            <option value="">All types</option>
            <option value="cosem_attribute_access">COSEM attribute access</option>
            <option value="security_policy_bit">Security policy bit</option>
            <option value="security_policy_state">Security policy state</option>
            <option value="association_security_matrix">Association security</option>
            <option value="event_definition">Event definition</option>
          </select>
          <button id="reload">Reload</button>
        </div>
        <div class="scroll">
          <table>
            <thead>
              <tr>
                <th style="width: 120px">ID</th>
                <th style="width: 180px">Type</th>
                <th style="width: 130px">Review</th>
                <th style="width: 220px">Object</th>
                <th>Requirement</th>
              </tr>
            </thead>
            <tbody id="requirements"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script>
      const API = "http://127.0.0.1:8770";
      const esc = (value) =>
        String(value || "").replace(/[&<>"']/g, (ch) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        })[ch]);

      async function load() {
        const quality = await fetch(`${API}/quality`).then((r) => r.json());
        const reviewSummary = await fetch(`${API}/review-summary`).then((r) => r.json());
        document.getElementById("summary").innerHTML = [
          metric("Atomic requirements", quality.counts?.atomic_requirements || 0),
          metric("Low confidence", quality.counts?.low_confidence_atomic_requirements || 0),
          metric("Expert pending", reviewSummary.status_counts?.expert_pending || 0),
          metric("Accepted", reviewSummary.status_counts?.accepted || 0),
        ].join("");
        document.getElementById("quality").textContent = JSON.stringify(
          {
            counts: quality.counts,
            coverage: quality.coverage,
            requirement_type_counts: quality.requirement_type_counts,
            review: reviewSummary,
          },
          null,
          2,
        );
        const type = document.getElementById("typeFilter").value;
        const query = type ? `&type=${encodeURIComponent(type)}` : "";
        const rows = await fetch(`${API}/requirements?limit=100${query}`).then((r) => r.json());
        document.getElementById("requirements").innerHTML = rows
          .map(
            (row) => {
              const status = row.review_state?.status || "unknown";
              const decision = row.review?.decision || "unreviewed";
              return `<tr>
              <td><code>${esc(row.req_id)}</code></td>
              <td>${esc(row.requirement_type)}</td>
              <td><span class="badge ${esc(status)}">${esc(status)}</span><br><span class="muted">${esc(decision)}</span></td>
              <td>${esc(row.object)}</td>
              <td>${esc(row.requirement)}</td>
            </tr>`;
            },
          )
          .join("");
      }

      function metric(label, value) {
        return `<div class="metric"><span>${esc(label)}</span><strong>${esc(value)}</strong></div>`;
      }

      document.getElementById("reload").addEventListener("click", load);
      document.getElementById("typeFilter").addEventListener("change", load);
      load().catch((error) => {
        document.getElementById("quality").textContent = String(error);
      });
    </script>
  </body>
</html>
